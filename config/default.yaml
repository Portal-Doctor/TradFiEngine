# TradFiBot Configuration
# Phase isolation: each phase uses only its own paths. Running one never affects the others.
paths:
  checkpoints: "checkpoints"       # Phase 1 (Learning) writes only here
  order_db: "data/orders.db"       # Phase 3 (Live) default
  order_db_paper: "data/paper/orders.db"
  order_db_live: "data/orders.db"

# Paper trading (safety buffer)
paper:
  slippage_pct: 0.0008   # 0.08% simulated slippage (between 0.05-0.1%)
  log_latency: true      # Log time from signal to order confirmation
  order_db_path: null    # Uses paths.order_db_paper when null

# Live trading (hardened)
live:
  max_daily_drawdown_pct: 5.0   # Kill switch: stop if daily loss exceeds this %
  api_retry_max: 5              # Max retries for 429/5xx with exponential backoff
  order_db_path: null           # Uses paths.order_db_live when null

# Objectives
objectives:
  max_trades_per_day: 10
  double_capital_days: 30   # Target: 2x capital every 30 days

# Trading pairs (alt-coins for training and live)
# Selected for high volume, liquidity, and volatility
symbols:
  default: "BTC-USDT"
  training:
    - BTC-USDT   # Bitcoin — benchmark
    - ETH-USDT   # Ethereum — benchmark
    - SOL-USDT   # Solana — extremely high volume and volatility
    - XRP-USDT   # Ripple — high liquidity, regulatory-driven swings
    - DOGE-USDT  # Dogecoin — extreme sentiment-driven volatility
    - AVAX-USDT  # Avalanche — active ecosystem, high volatility
    - LINK-USDT  # Chainlink — oracle standard, ecosystem-driven moves
    - MATIC-USDT # Polygon — top Ethereum L2, heavily traded
    - LTC-USDT   # Litecoin — long-lived, reliable volatility
    - ADA-USDT   # Cardano — speculative community, large fluctuations
  live:
    - BTC-USDT
    - ETH-USDT
    - SOL-USDT
    - XRP-USDT
    - DOGE-USDT
    - AVAX-USDT
    - LINK-USDT
    - MATIC-USDT
    - LTC-USDT
    - ADA-USDT

# Fees — critical for learning profitable trades
fees:
  maker: 0.004   # 0.4% maker fee (limit orders)
  taker: 0.006   # 0.6% taker fee (market orders)
  # Min profit threshold to account for round-trip fee
  min_profit_pct: 0.012  # ~1.2% to cover buy+sell taker fees

# Feature scaling (non-stationary financial data)
features:
  use_log_returns: true   # Log-returns instead of raw pct_change for stationarity

# Technical indicators
indicators:
  macd:
    fast: 12
    slow: 26
    signal: 9
  rsi:
    length: 14
    overbought: 70
    oversold: 30
  bollinger:
    length: 20
    std: 2.0
  atr:
    length: 14

# Environment (Gymnasium)
env:
  initial_balance: 10000.0
  max_position_pct: 0.95   # Max 95% in asset
  window_size: 60          # Lookback bars in observation
  reward_scale: 1.0
  episode_bars: 500        # Bars per episode (~21 days at 1h); random start each episode

# Training
training:
  total_timesteps: 100000  # Total env steps across all episodes
  learning_rate: 0.0003
  batch_size: 64
  gamma: 0.99
  # Walk-forward: rolling window (months of data per fold, None = single block)
  walk_forward_train_months: null   # e.g. 6 for train on 6 months
  walk_forward_test_months: null    # e.g. 1 for test on next month
